# Sample Gitea Actions Workflow
# Place this file in .gitea/workflows/ directory in your repository
# This demonstrates basic CI/CD capabilities for deep dive challenges

name: CI Pipeline
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm ci
          fi

      - name: Run tests
        run: |
          if [ -f package.json ]; then
            npm test
          fi

      - name: Build application
        run: |
          if [ -f package.json ]; then
            npm run build --if-present
          fi

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run security checks
        run: |
          echo "Running security scan..."
          # Add your security scanning tools here
          # Example: trivy, snyk, npm audit, etc.
          if [ -f package.json ]; then
            npm audit
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run linting
        run: |
          if [ -f package.json ]; then
            npm ci
            npm run lint --if-present
          fi
