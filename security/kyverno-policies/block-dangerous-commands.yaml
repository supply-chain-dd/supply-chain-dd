apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: block-dangerous-task-commands
  annotations:
    policies.kyverno.io/title: Block Dangerous Commands in Tekton Tasks
    policies.kyverno.io/category: Tekton Security, Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Task, TaskRun
    policies.kyverno.io/description: >-
      Prevents execution of dangerous commands like 'go run' on untrusted code,
      direct execution of scripts from checked-out repos, and other risky patterns
      that could lead to arbitrary code execution.
spec:
  validationFailureAction: audit  # Set to 'enforce' to block
  background: true
  rules:
  - name: warn-on-go-run-execution
    match:
      any:
      - resources:
          kinds:
          - Task
          - TaskRun
          namespaces:
          - ctf-challenge
    validate:
      message: >-
        WARNING: Task contains 'go run' command which executes arbitrary code.
        This is dangerous for PR pipelines as it can run malicious code from
        untrusted contributors. Use 'go build' + binary execution instead, or
        run in sandboxed environment without cluster access.
      pattern:
        spec:
          =(steps):
          - =(script): "!*go run*"

  - name: warn-on-direct-script-execution
    match:
      any:
      - resources:
          kinds:
          - Task
          namespaces:
          - ctf-challenge
    validate:
      message: >-
        WARNING: Task executes scripts directly from checked-out repository.
        If this runs on untrusted PRs, attackers can execute arbitrary code.
        Consider: 1) Only run on trusted branches, 2) Use read-only SA,
        3) Add network egress restrictions.
      pattern:
        spec:
          =(steps):
          - =(script): "!*./scripts/*"

  - name: block-privileged-containers
    match:
      any:
      - resources:
          kinds:
          - Task
          - TaskRun
    validate:
      message: >-
        Privileged containers are not allowed in Tekton tasks.
        This prevents container escape attacks and limits blast radius.
      pattern:
        spec:
          =(steps):
          - =(securityContext):
              =(privileged): false

  - name: warn-on-curl-pipe-bash
    match:
      any:
      - resources:
          kinds:
          - Task
          - TaskRun
    validate:
      message: >-
        WARNING: Detected 'curl | bash' pattern which downloads and executes
        untrusted code. This is a critical supply chain security risk.
      pattern:
        spec:
          =(steps):
          - =(script): "!*curl*|*bash*"
