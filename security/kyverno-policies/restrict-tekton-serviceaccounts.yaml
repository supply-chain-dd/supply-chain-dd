apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-tekton-pr-pipelines
  annotations:
    policies.kyverno.io/title: Restrict ServiceAccounts for PR Pipelines
    policies.kyverno.io/category: Tekton Security, Supply Chain Security
    policies.kyverno.io/severity: critical
    policies.kyverno.io/subject: PipelineRun, TaskRun
    policies.kyverno.io/description: >-
      Prevents PR pipelines from using privileged ServiceAccounts that can access secrets.
      This mitigates the pull_request_target equivalent attack in Tekton where untrusted
      code could steal Kubernetes secrets and tokens.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
  - name: require-readonly-serviceaccount-for-prs
    match:
      any:
      - resources:
          kinds:
          - PipelineRun
          - TaskRun
          namespaces:
          - ctf-challenge
          - tekton-pipelines
    validate:
      message: >-
        PR pipelines must use 'pr-pipeline-readonly' ServiceAccount.
        Using the default or privileged ServiceAccount allows untrusted code
        to access cluster secrets. See ATTACK-ANALYSIS.md for details.
      deny:
        conditions:
          any:
          # Deny if using default ServiceAccount
          - key: "{{ request.object.spec.serviceAccountName || 'default' }}"
            operator: Equals
            value: "default"
          # Deny if using pipeline admin ServiceAccount
          - key: "{{ request.object.spec.serviceAccountName || '' }}"
            operator: Equals
            value: "pipeline-admin"
          # Deny if using tekton-triggers-sa for TaskRuns
          - key: "{{ request.object.spec.serviceAccountName || '' }}"
            operator: Equals
            value: "tekton-triggers-sa"

  - name: block-secret-volume-mounts
    match:
      any:
      - resources:
          kinds:
          - TaskRun
          namespaces:
          - ctf-challenge
    validate:
      message: >-
        TaskRuns cannot mount secret volumes in untrusted pipelines.
        This prevents malicious code from directly reading secrets.
      pattern:
        spec:
          =(taskSpec):
            =(volumes):
            - X(secret): null
