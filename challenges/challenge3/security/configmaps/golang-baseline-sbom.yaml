---
# ConfigMap: golang-baseline-sbom
#
# Contains the expected SPDX ID + purl pairs from a clean
# golang:1.25-alpine image. Used by the verify-base-image task to
# detect image tampering via SBOM baseline comparison.
#
# SPDX IDs (primary key) include content-based hashes generated by Syft.
# Purls (display context) show package ecosystem, name, and version.
#
# To regenerate from a known-good image:
#   syft scan golang:1.25-alpine -o spdx-json | \
#     jq '[.packages[] | {spdxid: .SPDXID, purl: (.externalRefs[]? | select(.referenceType == "purl") | .referenceLocator)}] | sort_by(.spdxid)' \
#     > baseline-packages.json
#
# IMPORTANT: These values are placeholders. The defense-demo.sh script
# regenerates the baseline from the actual clean image at demo time.
apiVersion: v1
kind: ConfigMap
metadata:
  name: golang-baseline-sbom
  namespace: ctf-challenge
data:
  baseline-packages.json: |
    [
      {"spdxid": "SPDXRef-DocumentRoot-Image-PLACEHOLDER", "purl": "pkg:oci/golang@sha256:PLACEHOLDER"},
      {"spdxid": "SPDXRef-Package-apk-alpine-baselayout-PLACEHOLDER", "purl": "pkg:apk/alpine/alpine-baselayout@PLACEHOLDER"},
      {"spdxid": "SPDXRef-Package-apk-alpine-baselayout-data-PLACEHOLDER", "purl": "pkg:apk/alpine/alpine-baselayout-data@PLACEHOLDER"},
      {"spdxid": "SPDXRef-Package-apk-alpine-keys-PLACEHOLDER", "purl": "pkg:apk/alpine/alpine-keys@PLACEHOLDER"},
      {"spdxid": "SPDXRef-Package-apk-apk-tools-PLACEHOLDER", "purl": "pkg:apk/alpine/apk-tools@PLACEHOLDER"},
      {"spdxid": "SPDXRef-Package-apk-busybox-PLACEHOLDER", "purl": "pkg:apk/alpine/busybox@PLACEHOLDER"},
      {"spdxid": "SPDXRef-Package-apk-ca-certificates-PLACEHOLDER", "purl": "pkg:apk/alpine/ca-certificates@PLACEHOLDER"},
      {"spdxid": "SPDXRef-Package-apk-musl-PLACEHOLDER", "purl": "pkg:apk/alpine/musl@PLACEHOLDER"},
      {"spdxid": "SPDXRef-Package-apk-zlib-PLACEHOLDER", "purl": "pkg:apk/alpine/zlib@PLACEHOLDER"},
      {"spdxid": "SPDXRef-Package-binary-go-PLACEHOLDER", "purl": "pkg:generic/go@PLACEHOLDER"},
      {"spdxid": "SPDXRef-Package-go-module-stdlib-PLACEHOLDER", "purl": "pkg:golang/stdlib@PLACEHOLDER"}
    ]
