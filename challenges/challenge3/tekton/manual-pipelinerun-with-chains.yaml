---
# Manual PipelineRun for Challenge 3 — Enhanced Chains variant
# Triggers push-build-pipeline-with-chains, which:
#   1. Verifies source provenance (repo URL + branch containment)
#   2. Builds and pushes the image (emitting IMAGE_URL + IMAGE_DIGEST)
#   3. Lets Tekton Chains sign the image and generate a SLSA Provenance attestation
#   4. Attaches an unsigned Source VSA via OCI referrers API
#   5. Scans for secrets with Trivy and attaches results
#   6. Scans for vulnerabilities with Trivy and attaches results
#   7. Generates an SPDX JSON SBOM and attaches it
#
# All artifacts (VSA, secret scan, vuln scan, SBOM) are included in the
# provenance attestation via Tekton Chains type-hinted results.
apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  generateName: push-build-chains-manual-
  namespace: ctf-challenge
  labels:
    tekton.dev/pipeline: push-build-pipeline-with-chains
    trigger-type: manual
spec:
  serviceAccountName: challenge2-pipeline
  pipelineRef:
    name: push-build-pipeline-with-chains
  params:
    - name: repo-url
      value: http://gitea-http.gitea.svc.cluster.local:3000/ctf-admin/recipe-api.git
    - name: revision
      value: main
    - name: trusted-repo-url
      value: http://gitea-http.gitea.svc.cluster.local:3000/ctf-admin/recipe-api.git
    - name: image-name
      value: recipe-api
    - name: image-tag
      value: v1.0
  workspaces:
    - name: source
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
