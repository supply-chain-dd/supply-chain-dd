---
# Docker config secret for Kaniko to authenticate with the registry
# This secret contains the Docker config.json with registry credentials
apiVersion: v1
kind: Secret
metadata:
  name: registry-docker-config
  namespace: ctf-challenge
type: Opaque
stringData:
  config.json: |
    {
      "auths": {
        "registry.registry.svc.cluster.local:5000": {
          "auth": "Y3RmLWFkbWluOkNURlJlZ2lzdHJ5UGFzczEyMyE="
        }
      }
    }
---
# Note: The auth value is base64(ctf-admin:CTFRegistryPass123!)
# To regenerate: echo -n 'ctf-admin:CTFRegistryPass123!' | base64
# Result: Y3RmLWFkbWluOkNURlJlZ2lzdHJ5UGFzczEyMyE=
