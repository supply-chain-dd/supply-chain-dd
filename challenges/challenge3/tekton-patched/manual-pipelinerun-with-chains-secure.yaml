---
# Manual PipelineRun for the secured Challenge 3 pipeline.
# Use: kubectl create -f challenges/challenge3/tekton-patched/manual-pipelinerun-with-chains-secure.yaml
apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  generateName: manual-secure-build-
  namespace: ctf-challenge
  labels:
    tekton.dev/pipeline: push-build-pipeline-with-chains-secure
spec:
  serviceAccountName: pipeline-keyless-signer
  pipelineRef:
    name: push-build-pipeline-with-chains-secure
  taskRunSpecs:
    - pipelineTaskName: sign-image-keyless
      taskServiceAccountName: pipeline-keyless-signer
    - pipelineTaskName: attest-sbom
      taskServiceAccountName: pipeline-keyless-signer
  params:
    - name: repo-url
      value: "http://gitea-http.gitea.svc.cluster.local:3000/ctf-admin/recipe-api.git"
    - name: revision
      value: "main"
    - name: image-name
      value: "recipe-api"
    - name: image-tag
      value: "v3.0"
    - name: registry-url
      value: "registry.registry.svc.cluster.local:5000"
  workspaces:
    - name: source
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
