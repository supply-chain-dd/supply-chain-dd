---
# Task: sign-image-keyless
#
# Signs a container image using cosign keyless flow with a local
# Sigstore stack (Fulcio + Rekor) deployed via sigstore/scaffolding.
#
# The signing identity comes from a projected serviceAccountToken
# volume with audience "sigstore". The local Fulcio trusts the
# cluster's OIDC issuer and issues a short-lived certificate.
#
# Prerequisites:
#   - Local Sigstore stack deployed: make setup-sigstore-local
#   - ConfigMap: sigstore-tuf-root in ctf-challenge (TUF root.json)
#   - ConfigMap: registry-ca-cert in ctf-challenge (ca.crt)
#   - Secret:   registry-docker-config in ctf-challenge
#   - PipelineRun must use SA: pipeline-keyless-signer
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: sign-image-keyless
  namespace: ctf-challenge
spec:
  params:
    - name: IMAGE_URL
      type: string
      description: Full image URL (registry/repo:tag)
    - name: IMAGE_DIGEST
      type: string
      description: Image digest (sha256:...)
    - name: FULCIO_URL
      type: string
      description: Fulcio CA URL (from ksvc fulcio in fulcio-system)
      default: "http://fulcio.fulcio-system.svc"
    - name: REKOR_URL
      type: string
      description: Rekor transparency log URL (from ksvc rekor in rekor-system)
      default: "http://rekor.rekor-system.svc"
    - name: TUF_MIRROR
      type: string
      description: TUF root mirror URL (from ksvc tuf in tuf-system)
      default: "http://tuf.tuf-system.svc"
    - name: TSA_URL
      type: string
      description: Timestamp Authority URL (from ksvc tsa in tsa-system)
      default: "http://tsa.tsa-system.svc/api/v1/timestamp"
  results:
    - name: IMAGE_SIGNATURE
      description: Indicates the image was signed successfully
  volumes:
    - name: oidc-token
      projected:
        sources:
          - serviceAccountToken:
              audience: sigstore
              expirationSeconds: 600
              path: oidc-token
    - name: docker-config
      secret:
        secretName: registry-docker-config
    - name: registry-ca-cert
      configMap:
        name: registry-ca-cert
    - name: tuf-root
      configMap:
        name: sigstore-tuf-root
  steps:
  - name: sign
    image: alpine:3.20
    volumeMounts:
      - name: oidc-token
        mountPath: /var/run/sigstore/cosign
        readOnly: true
      - name: docker-config
        mountPath: /docker-config
        readOnly: true
      - name: registry-ca-cert
        mountPath: /certs
        readOnly: true
      - name: tuf-root
        mountPath: /tuf
        readOnly: true
    env:
      - name: DOCKER_CONFIG
        value: /docker-config
      - name: COSIGN_VERSION
        value: "v3.0.6"
    script: |
      #!/bin/sh
      set -e

      apk add --no-cache curl ca-certificates > /dev/null

      echo "Downloading cosign ${COSIGN_VERSION}..."
      curl -fsSL "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" -o /usr/local/bin/cosign
      chmod +x /usr/local/bin/cosign

      cp /certs/ca.crt /usr/local/share/ca-certificates/registry.crt
      update-ca-certificates 2>/dev/null || true

      echo "Initializing TUF from local mirror..."
      cosign initialize \
        --mirror=$(params.TUF_MIRROR) \
        --root=/tuf/root.json

      IMAGE_REF="$(params.IMAGE_URL)@$(params.IMAGE_DIGEST)"

      echo "Signing image with keyless flow..."
      echo "  Image:  ${IMAGE_REF}"
      echo "  Fulcio: $(params.FULCIO_URL)"
      echo "  Rekor:  $(params.REKOR_URL)"
      echo "  TSA:    $(params.TSA_URL)"

      cosign signing-config create \
        --fulcio="url=$(params.FULCIO_URL),api-version=1,start-time=2024-01-01T00:00:00Z,operator=local" \
        --rekor="url=$(params.REKOR_URL),api-version=1,start-time=2024-01-01T00:00:00Z,operator=local" \
        --rekor-config="ANY" \
        --tsa="url=$(params.TSA_URL),api-version=1,start-time=2024-01-01T00:00:00Z,operator=local" \
        --tsa-config="ANY" \
        --output-file custom.signingconfig.json

      SIGSTORE_ID_TOKEN=$(cat /var/run/sigstore/cosign/oidc-token)
      export SIGSTORE_ID_TOKEN

      cosign sign -y \
        --signing-config custom.signingconfig.json \
        --registry-cacert=/certs/ca.crt \
        "${IMAGE_REF}"

      echo "keyless" > $(results.IMAGE_SIGNATURE.path)
      echo "✓ Image signed successfully (keyless via Fulcio)"
