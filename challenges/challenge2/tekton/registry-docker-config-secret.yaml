---
# Docker config secret for Kaniko to authenticate with the registry
# This secret contains the Docker config.json with registry credentials
apiVersion: v1
kind: Secret
metadata:
  name: registry-docker-config
  namespace: ci
type: Opaque
stringData:
  config.json: |
    {
      "auths": {
        "registry.registry.svc.cluster.local:5000": {
          "auth": "c2MtYWRtaW46UmVnaXN0cnlQYXNzMTIzIQ=="
        }
      }
    }
---
# Note: The auth value is base64(sc-admin:RegistryPass123!)
# To regenerate: echo -n 'sc-admin:RegistryPass123!' | base64
# Result: c2MtYWRtaW46UmVnaXN0cnlQYXNzMTIzIQ==
