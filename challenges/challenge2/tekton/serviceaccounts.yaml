---
# Shared ServiceAccount for Challenge 2 pipelines
# This is a basic ServiceAccount that allows the pipeline to access secrets
# (needed for registry authentication during the build/push process)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pr-pipeline-readonly
  namespace: ctf-challenge
  annotations:
    description: >-
      ServiceAccount for Challenge 2 push pipeline.
      Has access to secrets for registry authentication.
secrets:
  - name: gitea-credentials
---
# Role for Challenge 2 pipeline - allows secret access
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pipeline-role
  namespace: ctf-challenge
  annotations:
    description: >-
      Basic permissions for Challenge 2 pipeline.
      Includes secret access for registry authentication.
rules:
# Allow reading ConfigMaps
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]

# Allow reading secrets (for registry credentials)
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]

# Allow reading pipeline status
- apiGroups: ["tekton.dev"]
  resources: ["pipelineruns", "taskruns"]
  verbs: ["get", "list"]

# Allow pod operations (for build tasks)
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]
---
# Bind the role to the ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pr-pipeline-binding
  namespace: ctf-challenge
subjects:
- kind: ServiceAccount
  name: pr-pipeline-readonly
  namespace: ctf-challenge
roleRef:
  kind: Role
  name: pipeline-role
  apiGroup: rbac.authorization.k8s.io
