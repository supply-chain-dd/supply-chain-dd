---
# Pipeline: push-build-pipeline-with-chains
#
# Extends push-build-pipeline with supply chain security via Tekton Chains
# and SLSA source verification:
#
#   verify-source                                    ← validates repo URL + branch containment
#     └─ git-clone                                   ← emits url + commit results
#          └─ build-go-app
#               └─ run-quality-checks
#                    └─ build-container-image
#                         └─ push-container-image-with-chains   ← emits IMAGE_URL + IMAGE_DIGEST
#                              ├─ create-source-vsa             ← attaches unsigned Source VSA via OCI referrers
#                              ├─ scan-image                      ← Trivy vuln+secret scan → oras attach
#                              └─ generate-sbom                 ← Trivy SBOM + oras attach
#
# After push-container-image-with-chains completes, Tekton Chains automatically:
#   1. Signs the image with cosign (key in signing-secrets / tekton-chains namespace)
#   2. Generates a SLSA Provenance in-toto attestation
#   3. Stores both artefacts in the OCI registry alongside the image
#
# The verify-source task runs BEFORE git-clone and rejects untrusted sources
# (forks, commits not on the protected branch). It generates an unsigned
# Source VSA claiming SLSA_SOURCE_LEVEL_1. The create-source-vsa task attaches
# the VSA to the built image via OCI referrers API after the image is pushed.
# The scan-image task scans the image with Trivy for vulnerabilities and
# secrets, then attaches the results as an unsigned OCI artifact via oras.
#
# The generate-sbom task creates an SPDX JSON SBOM with Trivy and
# attaches it as an unsigned OCI artifact via oras.
#
# Both tasks run in parallel after push-container-image-with-chains.
#
# Note: Conforma (ec validate image) is not run inside the pipeline because
# Tekton Chains only generates PipelineRun attestations AFTER the pipeline
# completes — rules like attestation_type.pipelinerun_attestation_found and
# slsa_source_correlated.* cannot be satisfied from within the pipeline.
# Run ec from the command line after the pipeline finishes instead.
#
# Prerequisites (applied by make setup-challenge2-tekton):
#   - Tasks: verify-source-provenance, create-source-vsa
#            (verify-source-task.yaml in this repo)
#   - Tasks: push-container-image-with-chains, generate-sbom, scan-image,
#            (build-tasks-with-chains.yaml in this repo)
#   - All other tasks: git-clone, build-go-app, quality-check-task, build-container-image
#   - Secret:    cosign-signing-secret in ctf-challenge (cosign.key + cosign.password)
#   - ConfigMap: registry-ca-cert      in ctf-challenge (key: ca.crt)
#   - Secret:    registry-docker-config in ctf-challenge
apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: push-build-pipeline-with-chains
  namespace: ctf-challenge
spec:
  params:
    - name: repo-url
      type: string
      description: Git repository URL to clone
    - name: revision
      type: string
      description: Git revision (branch, tag, or SHA)
      default: "main"
    - name: trusted-repo-url
      type: string
      description: Trusted source repository URL (source verification checks repo-url against this)
      default: "http://gitea-http.gitea.svc.cluster.local:3000/ctf-admin/recipe-api.git"
    - name: image-name
      type: string
      description: Container image name
      default: "recipe-api"
    - name: image-tag
      type: string
      description: Container image tag
      default: "latest"
    - name: registry-url
      type: string
      description: Internal registry URL (cluster-accessible)
      default: "registry.registry.svc.cluster.local:5000"

  workspaces:
    - name: source
      description: Shared workspace for source code

  results:
    - name: IMAGE_URL
      description: Full URL of the pushed image
      value: $(tasks.push-container-image.results.IMAGE_URL)
    - name: IMAGE_DIGEST
      description: Digest of the pushed image
      value: $(tasks.push-container-image.results.IMAGE_DIGEST)
    - name: CHAINS-GIT_COMMIT
      description: Git commit SHA (Tekton Chains type hint for provenance materials)
      value: $(tasks.verify-source.results.VERIFIED_GIT_COMMIT)
    - name: CHAINS-GIT_URL
      description: Git repository URL (Tekton Chains type hint for provenance materials)
      value: $(tasks.verify-source.results.VERIFIED_GIT_URL)
    - name: VSA_DIGEST
      description: Digest of the Source VSA attached via OCI referrers
      value: $(tasks.create-source-vsa.results.VSA_DIGEST)

  tasks:
    - name: verify-source
      taskRef:
        name: verify-source-provenance
      params:
        - name: repo-url
          value: $(params.repo-url)
        - name: revision
          value: $(params.revision)
        - name: trusted-repo-url
          value: $(params.trusted-repo-url)
      workspaces:
        - name: source
          workspace: source

    - name: git-clone
      runAfter: ["verify-source"]
      taskRef:
        name: git-clone
      params:
        - name: url
          value: $(params.repo-url)
        - name: revision
          value: $(params.revision)
        - name: deleteExisting
          value: "true"
      workspaces:
        - name: output
          workspace: source

    - name: build-go-app
      runAfter: ["git-clone"]
      taskRef:
        name: build-go-app
      workspaces:
        - name: source
          workspace: source

    - name: run-quality-checks
      runAfter: ["build-go-app"]
      taskRef:
        name: quality-check-task
      workspaces:
        - name: source
          workspace: source

    # - name: build-container-image
    #   runAfter: ["run-quality-checks"]
    #   taskRef:
    #     name: build-container-image
    #   params:
    #     - name: image-name
    #       value: $(params.image-name)
    #     - name: image-tag
    #       value: $(params.image-tag)
    #   workspaces:
    #     - name: source
    #       workspace: source

    # Chains-aware push: emits IMAGE_URL and IMAGE_DIGEST results so that Tekton
    # Chains knows to sign the image and generate an in-toto attestation.
    - name: push-container-image
      runAfter: ["run-quality-checks"]
      taskRef:
        name: push-container-image-with-chains
      params:
        - name: image-name
          value: $(params.image-name)
        - name: image-tag
          value: $(params.image-tag)
        - name: registry-url
          value: $(params.registry-url)
      workspaces:
        - name: source
          workspace: source

    # Attach the unsigned Source VSA to the image via OCI referrers API.
    # Runs in parallel with generate-and-attest-sbom.
    - name: create-source-vsa
      runAfter: ["push-container-image"]
      taskRef:
        name: create-source-vsa
      params:
        - name: IMAGE_URL
          value: $(tasks.push-container-image.results.IMAGE_URL)
        - name: IMAGE_DIGEST
          value: $(tasks.push-container-image.results.IMAGE_DIGEST)
        - name: SOURCE_VSA
          value: $(tasks.verify-source.results.SOURCE_VSA)

    # Generate SPDX SBOM with Trivy and attach it to the image via OCI referrers.
    - name: generate-sbom
      runAfter: ["push-container-image"]
      taskRef:
        name: generate-sbom
      params:
        - name: IMAGE_URL
          value: $(tasks.push-container-image.results.IMAGE_URL)
        - name: IMAGE_DIGEST
          value: $(tasks.push-container-image.results.IMAGE_DIGEST)
        - name: SOURCE_VSA
          value: $(tasks.verify-source.results.SOURCE_VSA)

    # Scan image for vulnerabilities and secrets with Trivy, attach results via oras.
    # The scan results referrer digest is emitted as a Tekton Chains type-hinted
    # result (SCAN_RESULTS-ARTIFACT_URI/DIGEST) so Chains records it in the
    # SLSA provenance as a subject.
    # Runs in parallel with generate-and-attest-sbom.
    - name: scan-image
      runAfter: ["push-container-image"]
      taskRef:
        name: scan-image
      params:
        - name: IMAGE_URL
          value: $(tasks.push-container-image.results.IMAGE_URL)
        - name: IMAGE_DIGEST
          value: $(tasks.push-container-image.results.IMAGE_DIGEST)
