---
# Pipeline: push-build-pipeline-with-chains
#
# Extends push-build-pipeline with supply chain security via Tekton Chains:
#
#   git-clone                                       ← emits url + commit + CHAINS_GIT_* results
#     └─ build-go-app
#          └─ run-quality-checks
#               └─ build-container-image
#                    └─ push-container-image-with-chains   ← emits IMAGE_URL + IMAGE_DIGEST
#                         └─ generate-and-attest-sbom      ← Trivy SBOM + cosign attest
#
# After push-container-image-with-chains completes, Tekton Chains automatically:
#   1. Signs the image with cosign (key in signing-secrets / tekton-chains namespace)
#   2. Generates a SLSA Provenance in-toto attestation
#   3. Stores both artefacts in the OCI registry alongside the image
#
# The generate-and-attest-sbom task creates an SPDX JSON SBOM with Trivy and
# attaches it as an in-toto attestation using cosign attest.
#
# Note: Conforma (ec validate image) is not run inside the pipeline because
# Tekton Chains only generates PipelineRun attestations AFTER the pipeline
# completes — rules like attestation_type.pipelinerun_attestation_found and
# slsa_source_correlated.* cannot be satisfied from within the pipeline.
# Run ec from the command line after the pipeline finishes instead.
#
# Prerequisites (applied by make setup-challenge2-tekton):
#   - Tasks: push-container-image-with-chains, generate-and-attest-sbom
#            (build-tasks-with-chains.yaml in this repo)
#   - All other tasks: git-clone, build-go-app, quality-check-task, build-container-image
#   - Secret:    cosign-signing-secret in ctf-challenge (cosign.key + cosign.password)
#   - ConfigMap: registry-ca-cert      in ctf-challenge (key: ca.crt)
#   - Secret:    registry-docker-config in ctf-challenge
apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: push-build-pipeline-with-chains
  namespace: ctf-challenge
spec:
  params:
    - name: repo-url
      type: string
      description: Git repository URL to clone
    - name: revision
      type: string
      description: Git revision (branch, tag, or SHA)
      default: "main"
    - name: image-name
      type: string
      description: Container image name
      default: "recipe-api"
    - name: image-tag
      type: string
      description: Container image tag
      default: "latest"
    - name: registry-url
      type: string
      description: Internal registry URL (cluster-accessible)
      default: "registry.registry.svc.cluster.local:5000"

  workspaces:
    - name: source
      description: Shared workspace for source code

  # Propagate image coordinates as pipeline-level results — visible in PipelineRun
  # status and consumable by follow-on pipelines / integration tests.
  results:
    - name: IMAGE_URL
      description: Full URL of the pushed image
      value: $(tasks.push-container-image.results.IMAGE_URL)
    - name: IMAGE_DIGEST
      description: Digest of the pushed image
      value: $(tasks.push-container-image.results.IMAGE_DIGEST)
    - name: CHAINS-GIT_COMMIT
      description: Git commit SHA (Tekton Chains type hint for provenance materials)
      value: $(tasks.git-clone.results.commit)
    - name: CHAINS-GIT_URL
      description: Git repository URL (Tekton Chains type hint for provenance materials)
      value: $(tasks.git-clone.results.url)

  tasks:
    - name: git-clone
      taskRef:
        name: git-clone
      params:
        - name: url
          value: $(params.repo-url)
        - name: revision
          value: $(params.revision)
        - name: deleteExisting
          value: "true"
      workspaces:
        - name: output
          workspace: source

    - name: build-go-app
      runAfter: ["git-clone"]
      taskRef:
        name: build-go-app
      workspaces:
        - name: source
          workspace: source

    - name: run-quality-checks
      runAfter: ["build-go-app"]
      taskRef:
        name: quality-check-task
      workspaces:
        - name: source
          workspace: source

    - name: build-container-image
      runAfter: ["run-quality-checks"]
      taskRef:
        name: build-container-image
      params:
        - name: image-name
          value: $(params.image-name)
        - name: image-tag
          value: $(params.image-tag)
      workspaces:
        - name: source
          workspace: source

    # Chains-aware push: emits IMAGE_URL and IMAGE_DIGEST results so that Tekton
    # Chains knows to sign the image and generate an in-toto attestation.
    - name: push-container-image
      runAfter: ["build-container-image"]
      taskRef:
        name: push-container-image-with-chains
      params:
        - name: image-name
          value: $(params.image-name)
        - name: image-tag
          value: $(params.image-tag)
        - name: registry-url
          value: $(params.registry-url)
      workspaces:
        - name: source
          workspace: source

    # Generate SPDX SBOM with Trivy and attest it to the image with cosign.
    # Stored as an in-toto attestation with predicateType https://spdx.dev/Document.
    - name: generate-and-attest-sbom
      runAfter: ["push-container-image"]
      taskRef:
        name: generate-and-attest-sbom
      params:
        - name: IMAGE_URL
          value: $(tasks.push-container-image.results.IMAGE_URL)
        - name: IMAGE_DIGEST
          value: $(tasks.push-container-image.results.IMAGE_DIGEST)


