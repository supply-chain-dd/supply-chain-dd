---
# Build Go Application Task
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: build-go-app
  namespace: ci
spec:
  description: |
    Builds the Go application and produces a binary.
  workspaces:
    - name: source
      description: The workspace containing the source code
  steps:
    - name: build
      image: golang:1.25
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/bash
        set -e

        echo "============================================"
        echo "Building Go Application"
        echo "============================================"
        echo "Working directory: $(pwd)"
        echo ""

        # Initialize go modules if needed
        if [ ! -f "go.sum" ]; then
          echo "Initializing Go modules..."
          go mod download || true
        fi

        # Build the application
        echo "Building binary..."
        CGO_ENABLED=0 GOOS=linux go build -o recipe-api main.go

        echo ""
        echo "Build completed successfully!"
        ls -lh recipe-api
        echo "============================================"
---
# Build Container Image Task using Kaniko
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: build-container-image
  namespace: ci
spec:
  description: |
    Builds a container image using Kaniko (rootless builder).
  params:
    - name: image-name
      type: string
      description: Name of the image to build (e.g., recipe-api)
    - name: image-tag
      type: string
      description: Tag for the image
      default: "latest"
  workspaces:
    - name: source
      description: The workspace containing the Dockerfile and source code
  volumes:
    - name: registry-ca-cert
      configMap:
        name: registry-ca-cert
  steps:
    - name: build-image
      image: gcr.io/kaniko-project/executor:v1.23.2
      workingDir: $(workspaces.source.path)
      env:
        - name: DOCKER_CONFIG
          value: /tekton/home/.docker
        - name: SSL_CERT_DIR
          value: /kaniko/ssl/certs
      command:
        - /kaniko/executor
      args:
        - --dockerfile=Dockerfile
        - --context=$(workspaces.source.path)
        - --destination=$(params.image-name):$(params.image-tag)
        - --no-push
        - --tar-path=/workspace/source/image.tar
        - --ignore-path=/product_uuid
      volumeMounts:
        - name: registry-ca-cert
          mountPath: /kaniko/ssl/certs/additional-ca-cert-bundle.crt
          subPath: ca.crt
          readOnly: true
      script: ""

    - name: verify-image
      image: alpine:3.18
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        echo "============================================"
        echo "Container Image Built"
        echo "============================================"
        echo "Image: $(params.image-name):$(params.image-tag)"
        if [ -f "image.tar" ]; then
          echo "Image tarball size: $(du -h image.tar | cut -f1)"
          echo "✓ Image built successfully"
        else
          echo "✗ Image tarball not found"
          exit 1
        fi
        echo "============================================"
---
# Push Container Image Task
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: push-container-image
  namespace: ci
spec:
  description: |
    Pushes a container image to the local registry using Kaniko.
  params:
    - name: image-name
      type: string
      description: Name of the image to push (e.g., recipe-api)
    - name: image-tag
      type: string
      description: Tag for the image
      default: "latest"
    - name: registry-url
      type: string
      description: Registry URL
      default: "registry.registry.svc.cluster.local:5000"
  results:
    - name: image-digest
      description: Digest of the pushed image (sha256:...) 
    - name: image-url
      description: Full URL of the pushed image
  workspaces:
    - name: source
      description: The workspace containing the Dockerfile and source code
  volumes:
    - name: docker-config
      secret:
        secretName: registry-docker-config
        items:
          - key: config.json
            path: config.json
    - name: registry-ca-cert
      configMap:
        name: registry-ca-cert
  steps:
    - name: push-image
      image: gcr.io/kaniko-project/executor:v1.23.2
      workingDir: $(workspaces.source.path)
      env:
        - name: SSL_CERT_DIR
          value: /kaniko/ssl/certs
      command:
        - /kaniko/executor
      args:
        - --dockerfile=Dockerfile
        - --context=$(workspaces.source.path)
        - --destination=$(params.registry-url)/$(params.image-name):$(params.image-tag)
        - --verbosity=info
        - --ignore-path=/product_uuid
        - --digest-file=/tekton/results/image-digest
      volumeMounts:
        - name: docker-config
          mountPath: /kaniko/.docker/
          readOnly: true
        - name: registry-ca-cert
          mountPath: /kaniko/ssl/certs/additional-ca-cert-bundle.crt
          subPath: ca.crt
          readOnly: true

    - name: write-image-url
      image: alpine:3.18
      script: |
        #!/bin/sh
        printf '%s' "$(params.registry-url)/$(params.image-name):$(params.image-tag)" \
          > /tekton/results/image-url

