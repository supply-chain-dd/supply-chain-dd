---
# Task: verify-source-provenance
#
# Runs as the FIRST task in push-build-pipeline-with-chains, before git-clone.
# Validates that the source repository URL matches a trusted repository and
# that the target commit is reachable from a protected branch.
#
# On success: emits verified git URL/commit and an unsigned Source VSA JSON.
# On failure: exits non-zero, failing the pipeline before any code is cloned.
#
# The Source VSA is an in-toto Statement v1 with predicateType
# https://slsa.dev/verification_summary/v1, claiming SLSA_SOURCE_LEVEL_1.
# It is NOT signed here — Tekton Chains handles all signing. The VSA is
# passed as a task result to create-source-vsa, which attaches it to the
# built image via OCI referrers API.
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: verify-source-provenance
  namespace: ctf-challenge
spec:
  params:
    - name: repo-url
      type: string
      description: Git repository URL to verify
    - name: revision
      type: string
      description: Git revision (branch, tag, or SHA) to verify
      default: "main"
    - name: trusted-repo-url
      type: string
      description: The expected trusted repository URL
    - name: protected-branch
      type: string
      description: Branch the commit must be reachable from
      default: "main"
  results:
    - name: VERIFIED_GIT_URL
      description: The verified repository URL
    - name: VERIFIED_GIT_COMMIT
      description: The verified commit SHA
    - name: SOURCE_VERIFIED
      description: "true if source passed all checks"
    - name: SOURCE_VSA
      description: Unsigned Source VSA JSON (in-toto Statement v1)
  workspaces:
    - name: source
      description: Shared workspace (not used for VSA storage — see SOURCE_VSA result)
  steps:
    - name: verify-source
      image: alpine/git:v2.40.1
      script: |
        #!/bin/sh
        set -e

        normalize_url() {
          echo "$1" | sed 's/\.git$//' | sed 's|/$||' | tr '[:upper:]' '[:lower:]'
        }

        REPO_URL="$(params.repo-url)"
        TRUSTED_URL="$(params.trusted-repo-url)"
        REVISION="$(params.revision)"
        PROTECTED_BRANCH="$(params.protected-branch)"

        NORM_REPO=$(normalize_url "$REPO_URL")
        NORM_TRUSTED=$(normalize_url "$TRUSTED_URL")

        echo "============================================"
        echo "SLSA Source Verification"
        echo "============================================"
        echo "Repository URL:   $REPO_URL"
        echo "Trusted URL:      $TRUSTED_URL"
        echo "Revision:         $REVISION"
        echo "Protected branch: $PROTECTED_BRANCH"
        echo ""

        # Check 1: Repository URL matches trusted URL
        echo "--- Check 1: Repository URL match ---"
        if [ "$NORM_REPO" != "$NORM_TRUSTED" ]; then
          echo "FAIL: Source repository does not match trusted repository"
          echo "  Got:      $NORM_REPO"
          echo "  Expected: $NORM_TRUSTED"
          echo ""
          echo "This may indicate a fork-based attack (Challenge 1 pattern)."
          echo "Only code from the trusted repository is allowed."
          exit 1
        fi
        echo "PASS: Repository URL matches trusted URL"
        echo ""

        # Check 2: Commit is reachable from protected branch
        echo "--- Check 2: Protected branch containment ---"
        echo "Cloning bare repository..."
        git clone --bare "$REPO_URL" /tmp/repo 2>&1

        cd /tmp/repo
        COMMIT_SHA=$(git rev-parse "$REVISION" 2>/dev/null) || {
          echo "FAIL: Cannot resolve revision '$REVISION' to a commit"
          exit 1
        }
        echo "Resolved revision '$REVISION' to commit: $COMMIT_SHA"

        BRANCHES=$(git branch --contains "$COMMIT_SHA" 2>/dev/null || true)
        if echo "$BRANCHES" | grep -q "$PROTECTED_BRANCH"; then
          echo "PASS: Commit $COMMIT_SHA is reachable from '$PROTECTED_BRANCH'"
        else
          echo "FAIL: Commit $COMMIT_SHA is NOT reachable from '$PROTECTED_BRANCH'"
          echo "  Branches containing this commit:"
          echo "$BRANCHES" | sed 's/^/    /'
          echo ""
          echo "Only commits on the protected branch are allowed."
          exit 1
        fi
        echo ""

        # Write results
        echo "--- Source verification PASSED ---"
        printf '%s' "$REPO_URL" > /tekton/results/VERIFIED_GIT_URL
        printf '%s' "$COMMIT_SHA" > /tekton/results/VERIFIED_GIT_COMMIT
        printf '%s' "true" > /tekton/results/SOURCE_VERIFIED

    - name: generate-source-vsa
      image: alpine:3.18
      script: |
        #!/bin/sh
        set -e

        VERIFIED_URL=$(cat /tekton/results/VERIFIED_GIT_URL)
        VERIFIED_COMMIT=$(cat /tekton/results/VERIFIED_GIT_COMMIT)
        TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

        echo "Generating Source Verification Summary Attestation..."
        echo "  Repository: $VERIFIED_URL"
        echo "  Commit:     $VERIFIED_COMMIT"
        echo "  Timestamp:  $TIMESTAMP"
        echo ""

        cat > /tmp/source-vsa.json <<EOF
        {"_type":"https://in-toto.io/Statement/v1","subject":[{"uri":"git+${VERIFIED_URL}","digest":{"gitCommit":"${VERIFIED_COMMIT}"}}],"predicateType":"https://slsa.dev/verification_summary/v1","predicate":{"verifier":{"id":"https://ctf-cluster/tekton-source-verifier"},"timeVerified":"${TIMESTAMP}","resourceUri":"git+${VERIFIED_URL}","verifiedLevels":["SLSA_SOURCE_LEVEL_1"],"policy":{"uri":"ctf-challenge/source-verification-policy"},"verificationResult":"PASSED"}}
        EOF

        echo "Source VSA:"
        cat /tmp/source-vsa.json
        echo ""

        # Write VSA to task result (passed to create-source-vsa via pipeline params)
        # tr -d removes newlines and leading whitespace from the heredoc
        cat /tmp/source-vsa.json | tr -d '\n' | sed 's/^[[:space:]]*//' > /tekton/results/SOURCE_VSA
        echo "Source VSA written to task result."
---
# Task: create-source-vsa
#
# Runs after push-container-image, in parallel with generate-and-attest-sbom.
# Reads the unsigned Source VSA from a task param (passed from verify-source-
# provenance via pipeline result routing) and attaches it to the built image
# using the OCI referrers API via oras.
#
# The VSA digest is output as a result. Tekton Chains may include this in
# the signed provenance attestation.
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: create-source-vsa-with-chains
  namespace: ctf-challenge
spec:
  params:
    - name: IMAGE_URL
      type: string
      description: Full URL of the pushed image
    - name: IMAGE_DIGEST
      type: string
      description: Digest of the pushed image (sha256:...)
    - name: SOURCE_VSA
      type: string
      description: The Source VSA JSON to attach as a referrer
    - name: ORAS_VERSION
      type: string
      description: ORAS CLI version
      default: "v1.2.2"
  results:
    - name: VSA_DIGEST
      description: Digest of the attached VSA artifact (for Chains provenance inclusion)
  volumes:
    - name: docker-config
      secret:
        secretName: registry-docker-config
        items:
          - key: config.json
            path: config.json
    - name: registry-ca-cert
      configMap:
        name: registry-ca-cert
  steps:
    - name: attach-vsa
      image: alpine:3.18
      env:
        - name: DOCKER_CONFIG
          value: /docker-config
        - name: SSL_CERT_DIR
          value: /certs
      volumeMounts:
        - name: docker-config
          mountPath: /docker-config
          readOnly: true
        - name: registry-ca-cert
          mountPath: /certs
          readOnly: true
      script: |
        #!/bin/sh
        set -e

        apk add --no-cache curl ca-certificates > /dev/null 2>&1

        # Install CA cert for registry trust
        if [ -f /certs/ca.crt ]; then
          cp /certs/ca.crt /usr/local/share/ca-certificates/registry-ca.crt
          update-ca-certificates 2>/dev/null || true
        fi

        IMAGE_URL="$(params.IMAGE_URL)"
        IMAGE_DIGEST="$(params.IMAGE_DIGEST)"
        IMAGE_REF="${IMAGE_URL}@${IMAGE_DIGEST}"
        ORAS_VERSION="$(params.ORAS_VERSION)"

        echo "============================================"
        echo "Attaching Source VSA to image"
        echo "============================================"
        echo "Image: $IMAGE_REF"
        echo ""

        # Write VSA to file
        echo '$(params.SOURCE_VSA)' > source-vsa.json

        echo "Source VSA content:"
        cat source-vsa.json
        echo ""

        # Download oras
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64)  ARCH="amd64" ;;
          aarch64) ARCH="arm64" ;;
        esac
        ORAS_URL="https://github.com/oras-project/oras/releases/download/${ORAS_VERSION}/oras_${ORAS_VERSION#v}_linux_${ARCH}.tar.gz"

        echo "Downloading oras ${ORAS_VERSION}..."
        curl -fsSL "$ORAS_URL" | tar xz -C /tmp oras
        chmod +x /tmp/oras

        # Attach VSA as OCI referrer
        echo "Attaching VSA as OCI referrer..."
        ATTACH_OUTPUT=$(/tmp/oras attach \
          --artifact-type "application/vnd.slsa.verification_summary+json" \
          --distribution-spec v1.1-referrers-api \
          --registry-config /docker-config/config.json \
          "$IMAGE_REF" \
          source-vsa.json:application/json ) || {
          echo "WARNING: oras attach failed, trying without referrers API flag..."
          ATTACH_OUTPUT=$(/tmp/oras attach \
            --artifact-type "application/vnd.slsa.verification_summary+json" \
            --registry-config /docker-config/config.json \
            "$IMAGE_REF" \
            source-vsa.json:application/json )
        }

        echo "$ATTACH_OUTPUT"

        # Extract the digest of the attached artifact
        VSA_DIGEST=$(echo "$ATTACH_OUTPUT" | grep -oE 'sha256:[a-f0-9]{64}' | tail -1 || true)
        if [ -n "$VSA_DIGEST" ]; then
          printf '%s' "$VSA_DIGEST" > /tekton/results/VSA_DIGEST
          echo ""
          echo "Source VSA attached successfully."
          echo "VSA artifact digest: $VSA_DIGEST"
        else
          printf '%s' "unknown" > /tekton/results/VSA_DIGEST
          echo ""
          echo "WARNING: Could not extract VSA digest from oras output."
          echo "VSA may still have been attached. Check with: oras discover $IMAGE_REF"
        fi


