---
# ServiceAccount for keyless image signing via local Fulcio/Rekor
#
# This SA is used by the keyless signing pipeline. Its projected
# serviceAccountToken (audience: sigstore) is presented to the local
# Fulcio as an OIDC identity token. Fulcio issues a short-lived
# certificate binding the SA identity to the signing key.
#
# Certificate identity for verification:
#   https://kubernetes.io/namespaces/ctf-challenge/serviceaccounts/pipeline-keyless-signer
#
# OIDC issuer (extract from cluster):
#   kubectl get --raw /.well-known/openid-configuration | jq -r '.issuer'
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline-keyless-signer
  namespace: ctf-challenge
  annotations:
    description: >-
      ServiceAccount for keyless image signing pipeline.
      Its projected SA token is used as OIDC identity for Fulcio.
---
# Bind to existing pipeline-role (configmaps, secrets, pods, pipelineruns)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-keyless-signer-binding
  namespace: ctf-challenge
subjects:
  - kind: ServiceAccount
    name: pipeline-keyless-signer
    namespace: ctf-challenge
roleRef:
  kind: Role
  name: pipeline-role
  apiGroup: rbac.authorization.k8s.io
