apiVersion: apps/v1
kind: Deployment
metadata:
  name: recipe-api
  namespace: production
  labels:
    app: recipe-api
    environment: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: recipe-api
  template:
    metadata:
      labels:
        app: recipe-api
        environment: production
    spec:
      serviceAccountName: recipe-api-sa
      containers:
      - name: recipe-api
        image: localhost:30000/recipe-api:v1.0
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: recipe-api-secrets
              key: database-url
        - name: REDIS_URL
          value: "redis://redis-service.production.svc.cluster.local:6379/0"
        - name: LOG_LEVEL
          value: "info"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
