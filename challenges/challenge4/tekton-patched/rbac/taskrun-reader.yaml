---
# RBAC for notify-release-verified to read TaskRun annotations
# (needed to poll chains.tekton.dev/signed=true)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: taskrun-reader
  namespace: ci
rules:
  - apiGroups: ["tekton.dev"]
    resources: ["taskruns"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-keyless-signer-taskrun-reader
  namespace: ci
subjects:
  - kind: ServiceAccount
    name: pipeline-keyless-signer
    namespace: ci
roleRef:
  kind: Role
  name: taskrun-reader
  apiGroup: rbac.authorization.k8s.io
