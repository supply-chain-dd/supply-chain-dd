---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: release-triggers-sa
  namespace: release-pipeline
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: release-triggers-role
  namespace: release-pipeline
rules:
  - apiGroups: ["triggers.tekton.dev"]
    resources: ["eventlisteners", "triggerbindings", "triggertemplates"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: release-triggers-rolebinding
  namespace: release-pipeline
subjects:
  - kind: ServiceAccount
    name: release-triggers-sa
    namespace: release-pipeline
roleRef:
  kind: Role
  name: release-triggers-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: release-triggers-clusterbinding
subjects:
  - kind: ServiceAccount
    name: release-triggers-sa
    namespace: release-pipeline
roleRef:
  kind: ClusterRole
  name: tekton-triggers-aggregate-view
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: release-pipeline-secure-binding
  namespace: release-pipeline
spec:
  params:
    - name: image-url
      value: $(body.image-url)
    - name: image-digest
      value: $(body.image-digest)
    - name: image-tag
      value: $(body.image-tag)
---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: release-pipeline-secure-template
  namespace: release-pipeline
spec:
  params:
    - name: image-url
    - name: image-digest
    - name: image-tag
      default: "v1.0"
  resourcetemplates:
    - apiVersion: tekton.dev/v1beta1
      kind: PipelineRun
      metadata:
        generateName: release-secure-auto-
        namespace: release-pipeline
        labels:
          tekton.dev/pipeline: release-pipeline-secure
          trigger-type: webhook
      spec:
        serviceAccountName: release-pipeline-sa
        pipelineRef:
          name: release-pipeline-secure
        params:
          - name: image-url
            value: $(tt.params.image-url)
          - name: image-digest
            value: $(tt.params.image-digest)
          - name: image-tag
            value: $(tt.params.image-tag)
---
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: release-pipeline-secure-listener
  namespace: release-pipeline
spec:
  serviceAccountName: release-triggers-sa
  triggers:
    - name: release-secure-trigger
      bindings:
        - ref: release-pipeline-secure-binding
      template:
        ref: release-pipeline-secure-template
