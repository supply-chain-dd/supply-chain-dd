---
# Read-only ServiceAccount for PR pipelines (untrusted code)
# This ServiceAccount has NO access to secrets
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pr-pipeline-readonly
  namespace: ci
  annotations:
    description: >-
      Minimal ServiceAccount for PR pipelines that run untrusted code.
      Has NO access to secrets, preventing the attack demonstrated in
      ATTACK-ANALYSIS.md where malicious code steals Kubernetes secrets.
---
# Minimal Role for PR pipelines - READ-ONLY, NO SECRETS
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pr-pipeline-minimal
  namespace: ci
  annotations:
    description: >-
      Minimal permissions for PR pipelines. Explicitly excludes:
      - Secret access (no 'get', 'list', 'watch' on secrets)
      - Pod creation (prevents persistence attacks)
      - ServiceAccount token mounting
rules:
# Allow reading ConfigMaps (for pipeline configuration only)
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]

# NO secret access - this is critical!
# Even if malicious code tries:
#   token := readFile("/var/run/secrets/kubernetes.io/serviceaccount/token")
#   httpGet("https://kubernetes.default.svc/api/v1/namespaces/default/secrets/registry-credentials")
# The Kubernetes API will return 403 Forbidden

# Allow reading pipeline status (for logging/debugging)
- apiGroups: ["tekton.dev"]
  resources: ["pipelineruns", "taskruns"]
  verbs: ["get", "list"]
---
# Bind the minimal role to the readonly ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pr-pipeline-readonly-binding
  namespace: ci
subjects:
- kind: ServiceAccount
  name: pr-pipeline-readonly
  namespace: ci
roleRef:
  kind: Role
  name: pr-pipeline-minimal
  apiGroup: rbac.authorization.k8s.io
---
# Privileged ServiceAccount for main branch pipelines (TRUSTED code only)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: main-pipeline
  namespace: ci
  annotations:
    description: >-
      Privileged ServiceAccount for main branch pipelines only.
      Can access secrets but should NEVER be used for PR pipelines.
      Use only after code is reviewed and merged.
---
# Role for main branch pipelines - CAN access specific secrets
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: main-pipeline-privileged
  namespace: ci
  annotations:
    description: >-
      Privileged permissions for main branch pipelines.
      Has secret access but only for named secrets (not wildcard).
rules:
# Allow reading ConfigMaps
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]

# Allow reading SPECIFIC secrets by name (not all secrets)
# This limits blast radius - if compromised, can only access listed secrets
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
  resourceNames:
  - "docker-registry-secret"
  - "ci-deploy-key"
  # Note: registry-credentials is NOT in this list for the challenge
  # In production, only include secrets this pipeline actually needs

# Allow creating/updating deployments (for CD pipelines)
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "create", "update", "patch"]

# Allow pipeline status updates
- apiGroups: ["tekton.dev"]
  resources: ["pipelineruns", "taskruns"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
---
# Bind the privileged role to the main pipeline ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: main-pipeline-binding
  namespace: ci
subjects:
- kind: ServiceAccount
  name: main-pipeline
  namespace: ci
roleRef:
  kind: Role
  name: main-pipeline-privileged
  apiGroup: rbac.authorization.k8s.io
---
# Example: Audit ServiceAccount (for security monitoring tools)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: security-auditor
  namespace: ci
  annotations:
    description: >-
      ServiceAccount for security monitoring tools like Audicia.io
      that need to read audit logs and analyze RBAC permissions.
---
# Cluster-wide read-only role for security auditing
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: security-auditor
  annotations:
    description: >-
      Read-only access to cluster resources for security auditing.
      Used by tools like Audicia.io to analyze RBAC and detect
      anomalous secret access patterns.
rules:
# Read all resources (but not secrets content)
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["get", "list", "watch"]

# Explicitly deny secret content access
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
  # Note: ClusterRole allows, but you'd use Kyverno to prevent mounting
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: security-auditor-binding
subjects:
- kind: ServiceAccount
  name: security-auditor
  namespace: ci
roleRef:
  kind: ClusterRole
  name: security-auditor
  apiGroup: rbac.authorization.k8s.io
