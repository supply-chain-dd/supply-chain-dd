apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tekton-pipelines-egress-restriction
  namespace: tekton-pipelines
  annotations:
    description: >-
      Restricts egress traffic from Tekton pipeline pods to prevent
      data exfiltration attacks. Only allows communication with internal
      cluster services and DNS.
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/managed-by: tekton-pipelines
  policyTypes:
  - Egress
  egress:
  # Allow DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP

  # Allow communication with Kubernetes API server
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          component: apiserver
    ports:
    - port: 443
      protocol: TCP

  # Allow communication with Gitea (internal Git server)
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: gitea
    ports:
    - port: 3000
      protocol: TCP
    - port: 22
      protocol: TCP

  # Allow communication within same namespace
  - to:
    - podSelector: {}

  # IMPORTANT: Block all other egress traffic
  # This prevents exfiltration to attacker.com or other external servers
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ctf-challenge-egress-restriction
  namespace: ctf-challenge
  annotations:
    description: >-
      Restricts egress traffic from CTF challenge pipelines.
      Allows only the traffic needed by the build pipeline:
      DNS, K8s API, Gitea, local registry, and HTTPS to external
      hosts (Alpine packages, Go proxy, GitHub releases for tools).
      Non-HTTPS egress to the internet is blocked.
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  # Allow DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP

  # Allow communication with Kubernetes API server
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          component: apiserver
    ports:
    - port: 443
      protocol: TCP

  # Allow communication with internal Gitea
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: gitea
    ports:
    - port: 3000
      protocol: TCP
    - port: 22
      protocol: TCP

  # Allow communication with internal registry
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: registry
    ports:
    - port: 5000
      protocol: TCP

  # Allow EventListener to reach Tekton Triggers core interceptors
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: tekton-pipelines
    ports:
    - port: 8443
      protocol: TCP

  # Allow HTTPS to external hosts (required by the build pipeline):
  #   - Alpine CDN (dl-cdn.alpinelinux.org): apk add in Dockerfile and task steps
  #   - Go module proxy (proxy.golang.org, sum.golang.org): go mod download
  #   - GitHub releases (github.com, objects.githubusercontent.com):
  #     oras, trivy, cosign CLI downloads
  #
  # Only port 443 is allowed — HTTP (80) and arbitrary ports are blocked,
  # preventing plaintext exfiltration. RBAC and Kyverno provide additional
  # layers to limit what pipeline code can do with this access.
  - ports:
    - port: 443
      protocol: TCP

  # Allow communication within same namespace
  - to:
    - podSelector: {}
