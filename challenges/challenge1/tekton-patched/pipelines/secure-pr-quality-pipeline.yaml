---
# SECURE Pipeline - Demonstrates proper security controls
# This pipeline still clones and executes untrusted code from PRs,
# BUT it runs with minimal permissions (pr-pipeline-readonly ServiceAccount)
#
# Key security improvements:
#   1. ServiceAccount specified in PipelineRun (see triggers/secure-eventlistener.yaml)
#   2. pr-pipeline-readonly has NO secret access (RBAC in security/rbac/)
#   3. Network policies block data exfiltration (security/network-policies/)
#   4. Kyverno policies validate ServiceAccount usage (security/kyverno-policies/)
apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: pr-quality-check-pipeline
  namespace: ctf-challenge
  annotations:
    security/trust-level: "untrusted-pr"
    security/required-serviceaccount: "pr-pipeline-readonly"
    description: |
      Quality check pipeline for pull requests.
      Clones and executes code from untrusted PR forks, but with defense-in-depth:
      - Least privilege ServiceAccount (no secret access)
      - Network egress restrictions
      - Kyverno policy validation
spec:
  description: |
    Quality check pipeline that runs on pull requests.
    Still executes code from PR forks, but with security controls:
    - Must use pr-pipeline-readonly ServiceAccount (enforced by Kyverno)
    - Cannot access secrets (blocked by RBAC)
    - Cannot exfiltrate data (blocked by NetworkPolicy)
  params:
    - name: pr-repo-url
      type: string
      description: The git repository URL (from PR head - could be attacker's fork)
    - name: pr-sha
      type: string
      description: The git commit SHA (from PR head - could be attacker's code)
    - name: pr-number
      type: string
      description: Pull request number
  workspaces:
    - name: source
      description: Workspace for source code
  tasks:
    - name: clone-pr-code
      taskRef:
        name: git-clone
      params:
        - name: url
          value: $(params.pr-repo-url)
        - name: revision
          value: $(params.pr-sha)
        - name: deleteExisting
          value: "true"
      workspaces:
        - name: output
          workspace: source

    - name: build-go-app
      runAfter: ["clone-pr-code"]
      taskRef:
        name: build-go-app
      workspaces:
        - name: source
          workspace: source

    - name: show-repo-info
      runAfter: ["build-go-app"]
      taskRef:
        name: print-info
      params:
        - name: pr-number
          value: $(params.pr-number)
        - name: pr-sha
          value: $(params.pr-sha)
      workspaces:
        - name: source
          workspace: source

    - name: run-quality-checks
      runAfter: ["show-repo-info"]
      taskRef:
        name: quality-check-task
      workspaces:
        - name: source
          workspace: source

    - name: post-results
      runAfter: ["run-quality-checks"]
      taskRef:
        name: print-results
      workspaces:
        - name: source
          workspace: source
