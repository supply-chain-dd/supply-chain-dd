---
# Git Clone Task
# Note: This task inherits the ServiceAccount from the PipelineRun
# When used with pr-pipeline-readonly SA, it has minimal permissions
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: git-clone
  namespace: ci
  annotations:
    security/trust-level: "untrusted-input"
    description: "Clones git repositories including untrusted PR forks"
spec:
  description: Clone a git repository
  params:
    - name: url
      description: Repository URL to clone
      type: string
    - name: revision
      description: Revision to checkout (branch, tag, sha)
      type: string
      default: "main"
    - name: deleteExisting
      description: Clean out workspace before cloning
      type: string
      default: "true"
  workspaces:
    - name: output
      description: The workspace to clone into
  steps:
    - name: clone
      image: alpine/git:v2.40.1
      workingDir: $(workspaces.output.path)
      script: |
        #!/bin/sh
        set -e

        if [ "$(params.deleteExisting)" = "true" ]; then
          echo "Cleaning workspace..."
          rm -rf $(workspaces.output.path)/*
          rm -rf $(workspaces.output.path)/.[!.]*
        fi

        echo "Cloning $(params.url) at revision $(params.revision)..."
        git clone $(params.url) $(workspaces.output.path)/repo
        cd $(workspaces.output.path)/repo
        git checkout $(params.revision)

        echo "Clone completed successfully"
        echo "Repository: $(params.url)"
        echo "Revision: $(params.revision)"
        echo "Commit: $(git rev-parse HEAD)"

        # Move contents up one level for easier access
        mv $(workspaces.output.path)/repo/* $(workspaces.output.path)/ 2>/dev/null || true
        mv $(workspaces.output.path)/repo/.[!.]* $(workspaces.output.path)/ 2>/dev/null || true
        rm -rf $(workspaces.output.path)/repo
---
# Print Info Task
# Note: Inherits ServiceAccount from PipelineRun
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: print-info
  namespace: ci
spec:
  description: Print PR information
  params:
    - name: pr-number
      type: string
    - name: pr-sha
      type: string
  workspaces:
    - name: source
  steps:
    - name: print-info
      image: alpine:3.18
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        echo "============================================"
        echo "Pull Request Information"
        echo "============================================"
        echo "PR Number: $(params.pr-number)"
        echo "Commit SHA: $(params.pr-sha)"
        echo "Working Directory: $(pwd)"
        echo ""
        echo "Repository Contents:"
        ls -la
        echo "============================================"
---
# Print Results Task
# Note: Inherits ServiceAccount from PipelineRun
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: print-results
  namespace: ci
spec:
  description: Print quality check results
  workspaces:
    - name: source
  steps:
    - name: print-results
      image: alpine:3.18
      script: |
        #!/bin/sh
        echo "============================================"
        echo "Quality Check Summary"
        echo "============================================"
        echo "✓ All quality checks passed"
        echo "PR is ready for review"
        echo "============================================"
---
# Build Go Application Task
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: build-go-app
  namespace: ci
spec:
  description: |
    Builds the Go application and produces a binary.
  workspaces:
    - name: source
      description: The workspace containing the source code
  steps:
    - name: build
      image: golang:1.25
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/bash
        set -e

        echo "============================================"
        echo "Building Go Application"
        echo "============================================"
        echo "Working directory: $(pwd)"
        echo ""

        # Initialize go modules if needed
        if [ ! -f "go.sum" ]; then
          echo "Initializing Go modules..."
          go mod download || true
        fi

        # Build the application
        echo "Building binary..."
        CGO_ENABLED=0 GOOS=linux go build -o recipe-api main.go

        echo ""
        echo "Build completed successfully!"
        ls -lh recipe-api
        echo "============================================"
---