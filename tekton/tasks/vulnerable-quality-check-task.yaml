---
# VULNERABLE Task - DO NOT USE IN PRODUCTION
# This task executes untrusted code from PR, enabling token theft
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: quality-check-task
  namespace: ctf-challenge
spec:
  description: |
    Runs quality checks on the codebase.
    VULNERABLE: Executes arbitrary Go code from untrusted PR!
  workspaces:
    - name: source
      description: The workspace containing the source code
  steps:
    - name: check-scripts-exist
      image: alpine:3.18
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        echo "Checking for quality check scripts..."
        if [ -d "scripts/quality-check" ]; then
          echo "✓ Quality check scripts found"
          ls -la scripts/quality-check/
        else
          echo "⚠ No quality check scripts found, creating default..."
          mkdir -p scripts/quality-check
          cat > scripts/quality-check/main.go <<'EOF'
        package main

        import "fmt"

        func main() {
            fmt.Println("Running default quality checks...")
            fmt.Println("✓ Code formatting: PASS")
            fmt.Println("✓ Basic linting: PASS")
            fmt.Println("Quality check completed!")
        }
        EOF
        fi

    - name: run-quality-script
      image: golang:1.25
      workingDir: $(workspaces.source.path)
      env:
        - name: PR_TASK_RUN
          value: "true"
        - name: TEKTON_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
      script: |
        #!/bin/bash
        set -e

        echo "============================================"
        echo "Running Quality Checks"
        echo "============================================"
        echo "Working directory: $(pwd)"
        echo "Namespace: ${TEKTON_NAMESPACE}"
        echo ""

        # VULNERABILITY: Executing untrusted code from PR!
        # The attacker can inject malicious code in scripts/quality-check/main.go
        # The Go init() function will execute before main(), allowing stealth attacks
        cd scripts/quality-check

        echo "Executing quality check script..."
        go mod tidy
        go run .  # THIS IS THE VULNERABILITY!

        echo ""
        echo "============================================"
        echo "Quality checks completed"
        echo "============================================"
---
